<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DialRes 2026 - Program</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .map-container {
      margin-top: 30px;
      text-align: center;
      overflow: hidden; /* Prevents the zoomed image from overlapping other content */
    }
    
    .map-wrapper {
      position: relative;
      display: inline-block;
      overflow: hidden;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      cursor: zoom-in;
    }

    .map-wrapper img {
      max-width: 100%;
      height: auto;
      transition: transform 0.3s ease; /* Smooth transition for the zoom */
    }

    /* Zoom effect on hover */
    .map-wrapper:hover img {
      transform: scale(2.5); /* Adjust this number to increase/decrease zoom level */
    }

    /* Optional: Move the image based on mouse position for better navigation */
    .map-wrapper:active img {
      transform: scale(4); /* Extra zoom when clicking */
    }

    figcaption {
      margin-top: 10px;
      font-style: italic;
      color: #555;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a href="index.html" class="nav-logo">DialRes</a>
      <ul class="nav-list">
        <li><a href="index.html">Home</a></li>
        <li><a href="program.html">Program</a></li>
        <li><a href="call.html">Call for Papers</a></li>
        <li><a href="committee.html">Program Committee</a></li>
        <li><a href="registration.html">Registration</a></li>
      </ul>
    </nav>
  </header>

  <section class="section program">
    <div class="container">
      <h2>Program</h2>
      <p>Program schedule will be announced soon.</p>

      <div class="map-container">
        <h3>Geographical Distribution of Dialectal Resources</h3>
        <p><small>(Hover to zoom in on specific dialects)</small></p>
        <figure class="map-wrapper">
          <img src="countries_papers_map_all_final.png" alt="Map showing distribution of papers and countries for DialRes 2026">
        </figure>
        <figcaption>Map of countries and languages represented in the current program.</figcaption>
      </div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Dialres. All rights reserved.</p>
    </div>
  </footer>

  <script>
    // Optional: Follow the mouse cursor for a more natural zoom feel
    const wrapper = document.querySelector('.map-wrapper');
    const img = wrapper.querySelector('img');

    wrapper.addEventListener('mousemove', (e) => {
      const x = e.clientX - e.target.offsetLeft;
      const y = e.clientY - e.target.offsetTop;

      img.style.transformOrigin = `${x}px ${y}px`;
    });

    wrapper.addEventListener('mouseleave', () => {
      img.style.transformOrigin = 'center';
    });
  </script>
</body>
</html>
